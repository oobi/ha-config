- id: electricity_tariff_off_peak_start
  alias: Electricity Tariff - Off-Peak Start (11:00)
  description: Switch the consumption utility meter to the off-peak tariff
  mode: single
  trigger:
      - platform: time
        at: "11:00:00"
  action:
      - service: select.select_option
        target:
            entity_id: select.electricity_consumption
        data:
            option: off_peak

